{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header">

                    <h3 class="mb-0">
                        👨‍🔧 Technician
                    </h3>

                </div>

                <div class="card-body">

                    <form
                        method="post"
                        action="{{ url_for('technician.update', technician_id=technician.id) }}">

                        <div class="mb-3">

                            <label class="form-label">
                                Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="name"
                                value="{{ technician.name }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="phone"
                                value="{{ technician.phone }}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                name="email"
                                value="{{ technician.email }}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Position
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="position"
                                value="{{ technician.position }}">

                        </div>

                        <div class="d-flex justify-content-between">

                            <a
                                href="{{ url_for('technician.index') }}"
                                class="btn btn-secondary">

                                ← Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-primary">

                                Save

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

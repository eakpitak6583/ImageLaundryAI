<!doctype html>

<html>

<head>

<meta charset="utf-8">

<title>LaundryBot Login</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card">

<div class="card-header">

<h3>

LaundryBot Login

</h3>

</div>

<div class="card-body">

{% with messages = get_flashed_messages() %}

{% if messages %}

<div class="alert alert-danger">

{{ messages[0] }}

</div>

{% endif %}

{% endwith %}

<form method="post">

<div class="mb-3">

<label>

Username

</label>

<input
name="username"
class="form-control">

</div>

<div class="mb-3">

<label>

Password

</label>

<input
type="password"
name="password"
class="form-control">

</div>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>

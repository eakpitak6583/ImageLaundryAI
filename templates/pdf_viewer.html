<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <title>{{ filename|default("PDF Viewer") }}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.js"></script>

    <style>

        html,body{
            height:100%;
            margin:0;
            overflow:hidden;
            background:#edf1f5;
            font-family:Segoe UI,Tahoma,sans-serif;
        }

        .toolbar{

            height:64px;

            display:flex;

            align-items:center;

            gap:10px;

            padding:0 20px;

            background:#fff;

            border-bottom:1px solid #ddd;

            box-shadow:0 2px 8px rgba(0,0,0,.08);

        }

        .toolbar-title{

            font-weight:600;

            max-width:380px;

            overflow:hidden;

            text-overflow:ellipsis;

            white-space:nowrap;

        }

        .viewer{

            height:calc(100vh - 64px);

            overflow:auto;

            text-align:center;

            padding:30px;

        }

        #pdf_container{

            position:relative;

            display:inline-block;

        }

        canvas{

            display:block;

            background:white;

            box-shadow:0 5px 18px rgba(0,0,0,.18);

        }

        #text_layer{

            position:absolute;

            inset:0;

            pointer-events:none;

        }

        .page-box{

            width:80px;

        }

        .zoom-label{

            width:70px;

            text-align:center;

            font-weight:bold;

        }

        #loading{

            position:fixed;

            inset:0;

            background:rgba(255,255,255,.85);

            display:flex;

            justify-content:center;

            align-items:center;

            z-index:9999;

            font-size:22px;

            font-weight:bold;

        }

    </style>

</head>

<body>

<div id="loading">

    กำลังโหลด PDF...

</div>

<div class="toolbar">

    <div class="toolbar-title">

        <i class="bi bi-file-earmark-pdf-fill text-danger"></i>

        {{ filename|default("Unknown PDF") }}

    </div>

    <button
        class="btn btn-outline-secondary"
        onclick="prevPage()">

        <i class="bi bi-chevron-left"></i>

    </button>

    <button
        class="btn btn-outline-secondary"
        onclick="nextPage()">

        <i class="bi bi-chevron-right"></i>

    </button>

    <input

        id="page_input"

        class="form-control page-box"

        type="number"

        min="1"

        value="{{ page|default(1) }}">

    <button

        class="btn btn-primary"

        onclick="jumpPage()">

        Go

    </button>

    <div>

        Page

        <b id="page_num">1</b>

        /

        <b id="page_count">0</b>

    </div>

    <div class="ms-auto">

        <button

            class="btn btn-outline-primary"

            onclick="zoomOut()">

            <i class="bi bi-dash-lg"></i>

        </button>

        <span

            id="zoom_percent"

            class="zoom-label">

            140%

        </span>

        <button

            class="btn btn-outline-primary"

            onclick="zoomIn()">

            <i class="bi bi-plus-lg"></i>

        </button>

        <button

            class="btn btn-outline-dark"

            onclick="fitWidth()">

            Fit

        </button>

        <button

            class="btn btn-outline-dark"

            onclick="toggleFullscreen()">

            <i class="bi bi-fullscreen"></i>

        </button>

        <a

            class="btn btn-success"

            target="_blank"

            href="{{ url_for('documents.view_pdf', file=filename) }}">

            <i class="bi bi-download"></i>

            Download

        </a>

    </div>

</div>

<div class="viewer">

    <div id="pdf_container">

        <canvas id="pdf_canvas"></canvas>

        <div id="text_layer"></div>

    </div>

</div>

<script>

const PDF_URL =
"{{ url_for('documents.view_pdf', file=filename) }}";

const START_PAGE =
{{ page|default(1)|int }};

const SEARCH_KEYWORD =
{{ keyword|default("", true)|tojson }};

</script>

<script src="{{ url_for('static', filename='js/pdf_viewer.js') }}"></script>

</body>

</html>

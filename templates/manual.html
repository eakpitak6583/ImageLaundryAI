{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>

        📘 Machine Manuals

    </h2>

    <form
        method="GET"
        class="d-flex">

        <input

            class="form-control"

            name="q"

            placeholder="Search Manual..."

            value="{{ keyword }}">

        <button
            class="btn btn-primary ms-2">

            Search

        </button>

    </form>

</div>


<div class="card">

<div class="card-body">

<table class="table table-striped table-hover align-middle">

<thead class="table-dark">

<tr>

<th>PDF File</th>

<th>Model</th>

<th>Pages</th>

<th width="220">Action</th>

</tr>

</thead>

<tbody>

{% for m in manuals %}

<tr>

<td>

<i class="bi bi-file-earmark-pdf text-danger"></i>

{{ m.filename }}

</td>

<td>

{{ m.model or "-" }}

</td>

<td>

{{ m.total_pages }}

</td>

<td>

<a

class="btn btn-primary btn-sm"

href="/documents/view?file={{ m.filename }}"

target="_blank">

📄 View PDF

</a>

<a

class="btn btn-success btn-sm"

href="/ai/">

🤖 Ask AI

</a>

</td>

</tr>

{% else %}

<tr>

<td colspan="4" class="text-center text-muted">

No manuals found.

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}

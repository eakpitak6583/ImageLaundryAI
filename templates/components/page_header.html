<div class="row mb-4">

    <div class="col-md-8">

        <h2 class="fw-bold">

            {% if icon %}

                <i class="{{ icon }}"></i>

            {% endif %}

            {{ title }}

        </h2>

        {% if subtitle %}

        <p class="text-muted mb-0">

            {{ subtitle }}

        </p>

        {% endif %}

    </div>

    <div class="col-md-4 text-end">

        {% if add_url %}

        <a
            href="{{ add_url }}"
            class="btn btn-primary">

            <i class="bi bi-plus-circle"></i>

            {{ add_text or "Add New" }}

        </a>

        {% endif %}

    </div>

</div>

<form method="get" class="mb-3">

    <div class="row">

        <div class="col-md-10">

            <input
                type="text"
                class="form-control"
                name="q"
                placeholder="Search..."
                value="{{ request.args.get('q','') }}">

        </div>

        <div class="col-md-2">

            <button class="btn btn-primary w-100">
                Search
            </button>

        </div>

    </div>

</form>

{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>👨‍🔧 Technicians</h2>

        <form method="get" class="d-flex">

            <input
                class="form-control me-2"
                type="search"
                name="q"
                placeholder="Search..."
                value="{{ keyword }}">

            <button class="btn btn-primary">
                Search
            </button>

        </form>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover table-striped">

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Phone</th>

                        <th>Email</th>

                        <th>Position</th>

                        <th width="180">
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody>

                {% for tech in technicians %}

                    <tr>

                        <td>{{ tech.id }}</td>

                        <td>{{ tech.name }}</td>

                        <td>{{ tech.phone }}</td>

                        <td>{{ tech.email }}</td>

                        <td>{{ tech.position }}</td>

                        <td>

                            <a
                                href="{{ url_for('technician.detail', technician_id=tech.id) }}"
                                class="btn btn-sm btn-warning">

                                Edit

                            </a>

                            <form
                                method="post"
                                action="{{ url_for('technician.delete', technician_id=tech.id) }}"
                                style="display:inline;">

                                <button
                                    class="btn btn-sm btn-danger"
                                    onclick="return confirm('Delete technician?')">

                                    Delete

                                </button>

                            </form>

                        </td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
